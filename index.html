<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IR Bilgi Tabanı</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Syne:wght@400;600;700&display=swap');

  :root {
    --bg: #0d0f14;
    --bg2: #13161d;
    --bg3: #1a1e28;
    --border: #252a38;
    --text: #c9d1e0;
    --text-dim: #5a6480;
    --text-bright: #e8edf8;
    --accent: #4fc3f7;
    --accent2: #81c784;
    --accent3: #ffb74d;
    --accent4: #f06292;
    --accent5: #ce93d8;
    --node-branch: #2a3a5a;
    --node-leaf: #1e2d1e;
    --link: #2a3a5a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 44px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 100;
  }

  .header-title {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .header-hint {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  /* MAIN LAYOUT */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* MINDMAP PANEL */
  #mindmap-panel {
    flex: 1;
    overflow: hidden;
    position: relative;
    background: var(--bg);
  }

  svg {
    width: 100%;
    height: 100%;
    cursor: grab;
  }
  svg:active { cursor: grabbing; }

  /* LINKS */
  .link {
    fill: none;
    stroke: var(--border);
    stroke-width: 1.5px;
    opacity: 0.7;
  }

  /* NODES */
  .node { cursor: pointer; }

  .node-rect {
    rx: 4px;
    ry: 4px;
    transition: all 0.15s ease;
  }

  .node:hover .node-rect {
    filter: brightness(1.3);
  }

  .node-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    fill: var(--text);
    pointer-events: none;
    dominant-baseline: middle;
  }

  .node-root .node-rect { fill: #1a2540; stroke: var(--accent); stroke-width: 2px; }
  .node-root .node-text { fill: var(--accent); font-weight: 600; font-size: 12px; }

  .node-l1 .node-rect { fill: #1a2030; stroke: #3a5070; stroke-width: 1.5px; }
  .node-l1 .node-text { fill: #90caf9; font-weight: 500; font-size: 11px; }

  .node-l2 .node-rect { fill: #151e15; stroke: #2a4a2a; stroke-width: 1px; }
  .node-l2 .node-text { fill: #a5d6a7; font-size: 10.5px; }

  .node-l3 .node-rect { fill: #1e1a10; stroke: #4a3a10; stroke-width: 1px; }
  .node-l3 .node-text { fill: #ffe082; font-size: 10px; }

  .node-l3.has-content .node-rect { stroke: var(--accent3); }
  .node-l3.has-content:hover .node-rect { fill: #2a2418; }

  .node-l2.has-content .node-rect { stroke: var(--accent2); }
  .node-l2.has-content:hover .node-rect { fill: #1e2d1e; }

  .node-l1.has-content .node-rect { stroke: var(--accent); }

  /* collapse indicator */
  .collapse-dot {
    fill: var(--text-dim);
    pointer-events: none;
    transition: fill 0.15s;
  }
  .node:hover .collapse-dot { fill: var(--accent); }

  /* DETAIL PANEL */
  #detail-panel {
    width: 420px;
    background: var(--bg2);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    transition: width 0.25s ease;
    overflow: hidden;
  }

  #detail-panel.empty {
    width: 0;
    border-left: none;
  }

  .detail-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .detail-header .breadcrumb {
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .detail-header h2 {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--text-bright);
    line-height: 1.3;
  }

  .detail-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .detail-body::-webkit-scrollbar { width: 4px; }
  .detail-body::-webkit-scrollbar-track { background: transparent; }
  .detail-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* CONTENT RENDERING */
  .content-empty {
    color: var(--text-dim);
    font-size: 11px;
    margin-top: 20px;
    line-height: 1.7;
  }

  .content-section {
    margin-bottom: 20px;
  }

  .content-section h3 {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--accent);
    margin-bottom: 10px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--border);
  }

  .content-section h4 {
    font-size: 11px;
    font-weight: 600;
    color: var(--accent2);
    margin: 12px 0 6px;
  }

  .content-section p {
    font-size: 11px;
    line-height: 1.75;
    color: var(--text);
    margin-bottom: 8px;
  }

  .content-section ul {
    list-style: none;
    padding: 0;
  }

  .content-section ul li {
    font-size: 11px;
    line-height: 1.7;
    color: var(--text);
    padding: 2px 0 2px 14px;
    position: relative;
  }

  .content-section ul li::before {
    content: '›';
    position: absolute;
    left: 0;
    color: var(--text-dim);
  }

  .content-section ul li strong {
    color: var(--accent3);
    font-weight: 500;
  }

  .content-section ul li code {
    background: var(--bg3);
    border: 1px solid var(--border);
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 10px;
    color: var(--accent2);
  }

  .tag {
    display: inline-block;
    padding: 1px 7px;
    border-radius: 3px;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin: 2px 3px 2px 0;
  }

  .tag-windows { background: #1a3a5a; color: #90caf9; border: 1px solid #2a5a8a; }
  .tag-linux { background: #1a3a1a; color: #a5d6a7; border: 1px solid #2a5a2a; }
  .tag-critical { background: #3a1a1a; color: #ef9a9a; border: 1px solid #6a2a2a; }
  .tag-tool { background: #2a2a1a; color: #ffe082; border: 1px solid #5a5a2a; }

  .event-id {
    display: inline-block;
    background: var(--bg3);
    border: 1px solid var(--accent3);
    color: var(--accent3);
    padding: 0 6px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 600;
    margin-right: 4px;
    font-family: 'JetBrains Mono', monospace;
  }

  .cmd-block {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-left: 2px solid var(--accent2);
    border-radius: 4px;
    padding: 8px 12px;
    margin: 6px 0;
    font-size: 10px;
    color: var(--accent2);
    line-height: 1.6;
    overflow-x: auto;
  }

  .close-btn {
    position: absolute;
    top: 10px;
    right: 14px;
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 4px;
  }
  .close-btn:hover { color: var(--text-bright); }

  .detail-header { position: relative; }

  /* NO CONTENT SELECTED */
  .placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-dim);
    font-size: 11px;
    text-align: center;
    gap: 8px;
    padding: 20px;
  }

  .placeholder-icon { font-size: 32px; opacity: 0.3; }
</style>
</head>
<body>

<header>
  <div class="header-title">IR Bilgi Tabanı</div>
  <div class="header-hint">Düğüme tıkla → dal aç/kapat &nbsp;|&nbsp; İçerikli düğüm → sağda detay</div>

// ============================================================
// MINDMAP ENGINE
// ============================================================

const NODE_H = 26;
const NODE_PADDING = 12;
const H_GAP = 52;
const V_GAP = 6;

function measureText(text, fontSize) {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  ctx.font = `${fontSize}px JetBrains Mono`;
  return ctx.measureText(text).width;
}

function getNodeWidth(d) {
  const fs = d.depth === 0 ? 12 : d.depth === 1 ? 11 : 10.5;
  return Math.max(80, measureText(d.data.name, fs) + NODE_PADDING * 2 + (d.children || d._children ? 16 : 0));
}

class MindMap {
  constructor(data) {
    this.root = d3.hierarchy(data);
    this.root.each(d => {
      if (d.depth > 1 && d.children) {
        d._children = d.children;
        d.children = null;
      }
    });
    this.svg = d3.select('#svg');
    this.g = this.svg.append('g');
    this.setupZoom();
    this.update();
  }

  setupZoom() {
    const zoom = d3.zoom()
      .scaleExtent([0.2, 3])
      .on('zoom', e => this.g.attr('transform', e.transform));
    this.svg.call(zoom);
    const w = document.getElementById('mindmap-panel').clientWidth;
    const h = document.getElementById('mindmap-panel').clientHeight;
    this.svg.call(zoom.transform, d3.zoomIdentity.translate(w * 0.18, h / 2).scale(1));
  }

  layout(root) {
    const posMap = new Map();
    function calcSubtreeHeight(node) {
      if (!node.children || node.children.length === 0) {
        node._h = NODE_H;
        return NODE_H;
      }
      let total = 0;
      node.children.forEach((c, i) => {
        total += calcSubtreeHeight(c);
        if (i < node.children.length - 1) total += V_GAP;
      });
      node._h = total;
      return total;
    }

    function assignPos(node, x, y) {
      posMap.set(node, { x, y });
      if (!node.children || node.children.length === 0) return;
      const w = getNodeWidth(node);
      const cx = x + w + H_GAP;
      let cy = y - node._h / 2;
      node.children.forEach(c => {
        const ch = c._h;
        assignPos(c, cx, cy + ch / 2);
        cy += ch + V_GAP;
      });
    }

    calcSubtreeHeight(root);
    assignPos(root, 0, 0);
    root.each(d => {
      const p = posMap.get(d);
      d.x = p.y;
      d.y = p.x;
    });
  }

  update() {
    this.layout(this.root);

    const nodes = this.root.descendants();
    const links = this.root.links();

    // LINKS
    const linkSel = this.g.selectAll('.link').data(links, d => d.target.data.name + d.source.data.name);
    linkSel.enter().append('path').attr('class', 'link')
      .merge(linkSel)
      .attr('d', d => {
        const sw = getNodeWidth(d.source);
        const sx = d.source.y + sw;
        const sy = d.source.x;
        const tx = d.target.y;
        const ty = d.target.x;
        const mx = (sx + tx) / 2;
        return `M${sx},${sy} C${mx},${sy} ${mx},${ty} ${tx},${ty}`;
      });
    linkSel.exit().remove();

    // NODES
    const nodeSel = this.g.selectAll('.node').data(nodes, d => d.data.name);
    const enter = nodeSel.enter().append('g').attr('class', d => {
      const lvl = d.depth === 0 ? 'node-root' : d.depth === 1 ? 'node-l1' : d.depth === 2 ? 'node-l2' : 'node-l3';
      const hc = d.data.content ? ' has-content' : '';
      return `node ${lvl}${hc}`;
    })
    .attr('transform', d => `translate(${d.y},${d.x})`)
    .on('click', (e, d) => this.onClick(d));

    enter.append('rect').attr('class', 'node-rect')
      .attr('x', 0).attr('y', -NODE_H / 2)
      .attr('height', NODE_H)
      .attr('width', d => getNodeWidth(d));

    enter.append('text').attr('class', 'node-text')
      .attr('x', NODE_PADDING)
      .attr('y', 0)
      .text(d => d.data.name);

    enter.filter(d => d.children || d._children).append('circle')
      .attr('class', 'collapse-dot')
      .attr('cx', d => getNodeWidth(d) - 8)
      .attr('cy', 0)
      .attr('r', 3);

    const merged = enter.merge(nodeSel);
    merged.attr('transform', d => `translate(${d.y},${d.x})`);
    merged.select('.node-rect').attr('width', d => getNodeWidth(d));
    merged.select('.collapse-dot').attr('cx', d => getNodeWidth(d) - 8);
    nodeSel.exit().remove();
  }

  onClick(d) {
    if (d.data.content) {
      showDetail(d);
    }
    if (d.children) {
      d._children = d.children;
      d.children = null;
    } else if (d._children) {
      d.children = d._children;
      d._children = null;
    }
    this.update();
  }
}

// ============================================================
// DETAIL PANEL
// ============================================================

function getBreadcrumb(d) {
  const parts = [];
  let node = d.parent;
  while (node) {
    parts.unshift(node.data.name);
    node = node.parent;
  }
  return parts.join(' › ');
}

function showDetail(d) {
  const panel = document.getElementById('detail-panel');
  panel.classList.remove('empty');
  document.getElementById('detail-breadcrumb').textContent = getBreadcrumb(d);
  document.getElementById('detail-title').textContent = d.data.name;
  document.getElementById('detail-body').innerHTML = d.data.content;
}

function closePanel() {
  document.getElementById('detail-panel').classList.add('empty');
}
