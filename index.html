<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IR Bilgi Tabanı</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Syne:wght@400;600;700&display=swap');

  :root {
    --bg: #0d0f14; --bg2: #13161d; --bg3: #1a1e28;
    --border: #252a38; --text: #c9d1e0; --text-dim: #5a6480;
    --text-bright: #e8edf8; --accent: #4fc3f7;
    --accent2: #81c784; --accent3: #ffb74d;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'JetBrains Mono',monospace; height:100vh; overflow:hidden; display:flex; flex-direction:column; }

  header { display:flex; align-items:center; justify-content:space-between; padding:0 20px; height:44px; background:var(--bg2); border-bottom:1px solid var(--border); flex-shrink:0; }
  .header-title { font-family:'Syne',sans-serif; font-size:14px; font-weight:700; color:var(--accent); letter-spacing:.08em; text-transform:uppercase; }
  .header-hint { font-size:10px; color:var(--text-dim); }

  .main { display:flex; flex:1; overflow:hidden; }
  #mindmap-panel { flex:1; overflow:hidden; }
  svg { width:100%; height:100%; cursor:grab; }
  svg:active { cursor:grabbing; }

  .link { fill:none; stroke:var(--border); stroke-width:1.5px; opacity:.7; }
  .node { cursor:pointer; }
  .node-rect { rx:4px; ry:4px; }
  .node:hover .node-rect { filter:brightness(1.3); }
  .node-text { font-family:'JetBrains Mono',monospace; font-size:11px; fill:var(--text); pointer-events:none; dominant-baseline:middle; }

  .node-root .node-rect { fill:#1a2540; stroke:var(--accent); stroke-width:2px; }
  .node-root .node-text { fill:var(--accent); font-weight:600; font-size:12px; }
  .node-l1 .node-rect { fill:#1a2030; stroke:#3a5070; stroke-width:1.5px; }
  .node-l1 .node-text { fill:#90caf9; font-weight:500; }
  .node-l2 .node-rect { fill:#151e15; stroke:#2a4a2a; }
  .node-l2 .node-text { fill:#a5d6a7; font-size:10.5px; }
  .node-l3 .node-rect { fill:#1e1a10; stroke:#4a3a10; }
  .node-l3 .node-text { fill:#ffe082; font-size:10px; }
  .node-l4 .node-rect { fill:#1a1525; stroke:#3a2a50; }
  .node-l4 .node-text { fill:#ce93d8; font-size:10px; }

  .has-content.node-l2 .node-rect { stroke:var(--accent2); }
  .has-content.node-l3 .node-rect { stroke:var(--accent3); }
  .has-content.node-l4 .node-rect { stroke:#ce93d8; }

  .collapse-dot { fill:var(--text-dim); pointer-events:none; }
  .node:hover .collapse-dot { fill:var(--accent); }

  #detail-panel { width:440px; background:var(--bg2); border-left:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; transition:width .25s; overflow:hidden; }
  #detail-panel.empty { width:0; border-left:none; }

  .detail-header { padding:16px 20px 12px; border-bottom:1px solid var(--border); flex-shrink:0; position:relative; }
  .breadcrumb { font-size:9px; color:var(--text-dim); letter-spacing:.06em; text-transform:uppercase; margin-bottom:6px; }
  .detail-header h2 { font-family:'Syne',sans-serif; font-size:16px; font-weight:700; color:var(--text-bright); }
  .close-btn { position:absolute; top:10px; right:14px; background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:16px; }
  .close-btn:hover { color:var(--text-bright); }

  .detail-body { flex:1; overflow-y:auto; padding:16px 20px; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
  .detail-body::-webkit-scrollbar { width:4px; }
  .detail-body::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  /* MARKDOWN STİLLERİ */
  .md h1 { font-family:'Syne',sans-serif; font-size:15px; font-weight:700; color:var(--accent); margin:0 0 14px; padding-bottom:6px; border-bottom:1px solid var(--border); }
  .md h2 { font-family:'Syne',sans-serif; font-size:12px; font-weight:700; color:var(--accent2); margin:16px 0 8px; text-transform:uppercase; letter-spacing:.08em; }
  .md h3 { font-size:11px; font-weight:600; color:var(--accent3); margin:12px 0 6px; }
  .md h4 { font-size:11px; font-weight:600; color:#ce93d8; margin:10px 0 5px; }
  .md p { font-size:11px; line-height:1.8; color:var(--text); margin-bottom:8px; }
  .md ul,.md ol { list-style:none; padding:0; margin-bottom:10px; }
  .md ul li,.md ol li { font-size:11px; line-height:1.75; color:var(--text); padding:2px 0 2px 14px; position:relative; }
  .md ul li::before { content:'›'; position:absolute; left:0; color:var(--text-dim); }
  .md ol { counter-reset:li; }
  .md ol li { counter-increment:li; }
  .md ol li::before { content:counter(li)"."; position:absolute; left:0; color:var(--text-dim); font-size:10px; }
  .md strong { color:var(--accent3); font-weight:500; }
  .md em { color:#90caf9; font-style:normal; }
  .md code { background:var(--bg3); border:1px solid var(--border); padding:1px 5px; border-radius:3px; font-size:10px; color:var(--accent2); font-family:'JetBrains Mono',monospace; }
  .md pre { background:var(--bg3); border:1px solid var(--border); border-left:2px solid var(--accent2); border-radius:4px; padding:10px 12px; margin:8px 0; overflow-x:auto; }
  .md pre code { background:none; border:none; padding:0; font-size:10px; color:var(--accent2); line-height:1.7; }
  .md blockquote { border-left:2px solid var(--accent3); padding:4px 12px; margin:8px 0; color:var(--accent3); font-size:11px; }
  .md hr { border:none; border-top:1px solid var(--border); margin:14px 0; }
  .md table { width:100%; border-collapse:collapse; font-size:10px; margin:10px 0; }
  .md th { background:var(--bg3); color:var(--accent); padding:5px 8px; text-align:left; border:1px solid var(--border); }
  .md td { padding:4px 8px; border:1px solid var(--border); }
  .md tr:nth-child(even) td { background:#0f121a; }

  .loading { color:var(--text-dim); font-size:11px; padding:20px 0; text-align:center; }
  .no-content { color:var(--text-dim); font-size:11px; padding:20px 0; text-align:center; line-height:1.8; }
  .no-content code { font-size:10px; }
</style>
</head>
<body>

<div class="main">

      <button class="close-btn" onclick="closePanel()">✕</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script>

// ================================================================
// MARKDOWN PARSER (basit)
// ================================================================

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function parseMd(md) {
  // code blocks önce
  let out = md.replace(/```[^\n]*\n?([\s\S]*?)```/g,
    (_,c) => `<pre><code>${esc(c.trim())}</code></pre>`);

  out = out
    .replace(/`([^`\n]+)`/g, (_,c) => `<code>${esc(c)}</code>`)
    .replace(/^#### (.+)$/gm, '<h4>$1</h4>')
    .replace(/^### (.+)$/gm,  '<h3>$1</h3>')
    .replace(/^## (.+)$/gm,   '<h2>$1</h2>')
    .replace(/^# (.+)$/gm,    '<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,    '<em>$1</em>')
    .replace(/^---+$/gm,      '<hr>')
    .replace(/^> (.+)$/gm,    '<blockquote>$1</blockquote>')
    .replace(/^[-*] (.+)$/gm, '<li>$1</li>')
    .replace(/^\d+\. (.+)$/gm,'<oli>$1</oli>');

  out = out
    .replace(/(<li>[^]*?<\/li>\n?)+/g, m => `<ul>${m}</ul>`)
    .replace(/(<oli>[^]*?<\/oli>\n?)+/g, m =>
      `<ol>${m.replace(/<oli>/g,'<li>').replace(/<\/oli>/g,'</li>')}</ol>`);

  // kalan satırları paragraf yap
  out = out.replace(/^(?!<[huo\/bprt<]|$)(.+)$/gm, '<p>$1</p>');

  return `<div class="md">${out}</div>`;
}

// ================================================================
// DOSYA CACHE + FETCH
// ================================================================

const cache = {};

async function loadMd(path) {
  if (path in cache) return cache[path];
  try {
    const r = await fetch(path);
    if (!r.ok) throw new Error();
    const t = await r.text();
    cache[path] = t;
    return t;
  } catch {
    cache[path] = null;
    return null;
  }
}

// ================================================================
// MINDMAP
// ================================================================

const NH = 26, PAD = 12, HG = 52, VG = 6;
const _cv = document.createElement('canvas');
const _cx = _cv.getContext('2d');

function tw(text, fs) {
  _cx.font = `${fs}px "JetBrains Mono"`;
  return _cx.measureText(text).width;
}

function nw(d) {
  const fs = d.depth === 0 ? 12 : 11;
  const dot = (d.children || d._children) ? 16 : 0;
  return Math.max(90, tw(d.data.name, fs) + PAD * 2 + dot);
}

function nc(d) {
  const L = ['node-root','node-l1','node-l2','node-l3','node-l4'];
  return `node ${L[Math.min(d.depth,4)]}${d.data.file ? ' has-content' : ''}`;
}

class MM {
  constructor(data) {
    this.root = d3.hierarchy(data);
    this.root.each(d => {
      if (d.depth > 1 && d.children) { d._children = d.children; d.children = null; }
    });
    this.svg = d3.select('#svg');
    this.g = this.svg.append('g');
    this.initZoom();
    this.draw();
  }

  initZoom() {
    const z = d3.zoom().scaleExtent([.15,3])
      .on('zoom', e => this.g.attr('transform', e.transform));
    this.svg.call(z);
    const p = document.getElementById('mindmap-panel');
    this.svg.call(z.transform,
      d3.zoomIdentity.translate(p.clientWidth * .15, p.clientHeight / 2));
  }

  layout(root) {
    function ch(n) {
      if (!n.children?.length) { n._h = NH; return NH; }
      n._h = n.children.reduce((s,c,i) =>
        s + ch(c) + (i < n.children.length-1 ? VG : 0), 0);
      return n._h;
    }
    function ap(n, x, y) {
      n._x = x; n._y = y;
      if (!n.children?.length) return;
      const cx = x + nw(n) + HG;
      let cy = y - n._h/2;
      n.children.forEach(c => { ap(c, cx, cy + c._h/2); cy += c._h + VG; });
    }
    ch(root); ap(root, 0, 0);
    root.each(d => { d.x = d._y; d.y = d._x; });
  }

  draw() {
    this.layout(this.root);
    const nodes = this.root.descendants();
    const links = this.root.links();

    const lk = this.g.selectAll('.link')
      .data(links, d => d.source.data.name+'>'+d.target.data.name);
    lk.enter().append('path').attr('class','link')
      .merge(lk)
      .attr('d', d => {
        const sx = d.source.y + nw(d.source), sy = d.source.x;
        const tx = d.target.y, ty = d.target.x;
        const mx = (sx+tx)/2;
        return `M${sx},${sy} C${mx},${sy} ${mx},${ty} ${tx},${ty}`;
      });
    lk.exit().remove();

    const nd = this.g.selectAll('.node')
      .data(nodes, d => d.data.name);

    const en = nd.enter().append('g')
      .attr('class', d => nc(d))
      .attr('transform', d => `translate(${d.y},${d.x})`)
      .on('click', (e,d) => this.click(d));

    en.append('rect').attr('class','node-rect')
      .attr('x',0).attr('y',-NH/2).attr('height',NH)
      .attr('width', d => nw(d));
    en.append('text').attr('class','node-text')
      .attr('x',PAD).attr('y',0).text(d => d.data.name);
    en.filter(d => d.children||d._children)
      .append('circle').attr('class','collapse-dot')
      .attr('cx', d => nw(d)-8).attr('cy',0).attr('r',3);

    const mg = en.merge(nd);
    mg.attr('transform', d => `translate(${d.y},${d.x})`);
    mg.select('.node-rect').attr('width', d => nw(d));
    mg.select('.collapse-dot').attr('cx', d => nw(d)-8);
    nd.exit().remove();
  }

  click(d) {
    if (d.data.file) showDetail(d);
    if (d.children) { d._children=d.children; d.children=null; }
    else if (d._children) { d.children=d._children; d._children=null; }
    this.draw();
  }
}

// ================================================================
// PANEL
// ================================================================

function bc(d) {
  const p=[]; let n=d.parent;
  while(n){p.unshift(n.data.name);n=n.parent;}
  return p.join(' › ');
}

async function showDetail(d) {
  document.getElementById('detail-panel').classList.remove('empty');
  document.getElementById('d-bc').textContent = bc(d);
  document.getElementById('d-title').textContent = d.data.name;
  const body = document.getElementById('d-body');
  body.innerHTML = '<div class="loading">Yükleniyor...</div>';
  const md = await loadMd(d.data.file);
  body.innerHTML = md
    ? parseMd(md)
    : `<div class="no-content">Bu düğüm için henüz içerik yok.<br><br>
       Repoda şu dosyayı oluşturun:<br><code>${d.data.file}</code></div>`;
}

function closePanel() {
  document.getElementById('detail-panel').classList.add('empty');
}

window.addEventListener('load', () => new MM(DATA));
</script>
</body>
